<!DOCTYPE html>
<html lang="en-us">
  <head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/cg-rip@main/hammer-2/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  </head>
  <body style="margin:0;padding:0" class="noselect">
    <div id="loading-text" style="color: black; font-size: 48px; font-family: cursive; text-align: center; margin-top: 20px;">LOADING...</div>
    <canvas id="unity-canvas"
      style="position:fixed;top:0;left:0;width:100%;height:100%;outline:none"></canvas>

    <script>
    const SPLIT_MAP = {
      "29e3d3c8908bb566507cd8b1b3560e15.data": null,
      "0c2c310b28788b93284ef8d4d4fc6791.wasm": null,
      "01288fb2e5f57e194e52e16f7bed4cd4.framework.js": null
    };
    </script>

    <script>
    function mimeFor(url) {
      if (url.includes(".wasm")) return "application/wasm";
      if (url.includes(".js")) return "text/javascript";
      return "application/octet-stream";
    }

    async function resolveFile(baseUrl) {
      // 1. Try baseUrl.zip (single zip, no parts)
      try {
        const zipUrl = baseUrl + ".zip";
        const zipHead = await fetch(zipUrl, { method: "HEAD" });
        if (zipHead.ok) {
          const res = await fetch(zipUrl);
          const zip = await JSZip.loadAsync(await res.arrayBuffer());
          const entry = Object.values(zip.files).find(f => !f.dir);
          const data = await entry.async("arraybuffer");
          return URL.createObjectURL(new Blob([data], { type: mimeFor(baseUrl) }));
        }
      } catch (e) {}

      // 2. Try baseUrl.zip.part1 (zip split into parts — merge then unzip)
      try {
        const firstPart = baseUrl + ".zip.part1";
        const firstHead = await fetch(firstPart, { method: "HEAD" });
        if (firstHead.ok) {
          const parts = [firstPart];
          for (let i = 2; i <= 99; i++) {
            const partUrl = baseUrl + ".zip.part" + i;
            const h = await fetch(partUrl, { method: "HEAD" });
            if (!h.ok) break;
            parts.push(partUrl);
          }
          const buffers = await Promise.all(parts.map(async (u) => {
            const r = await fetch(u);
            if (!r.ok) throw new Error("Failed part " + u);
            return new Uint8Array(await r.arrayBuffer());
          }));
          const total = buffers.reduce((a, b) => a + b.length, 0);
          const merged = new Uint8Array(total);
          let offset = 0;
          for (const b of buffers) { merged.set(b, offset); offset += b.length; }
          const zip = await JSZip.loadAsync(merged.buffer);
          const entry = Object.values(zip.files).find(f => !f.dir);
          const data = await entry.async("arraybuffer");
          return URL.createObjectURL(new Blob([data], { type: mimeFor(baseUrl) }));
        }
      } catch (e) {}

      // 3. Try baseUrl.part1 (plain split, no zip)
      const parts = [];
      for (let i = 1; i <= 99; i++) {
        const testUrl = baseUrl + ".part" + i;
        try {
          const head = await fetch(testUrl, { method: "HEAD" });
          if (!head.ok) break;
          parts.push(testUrl);
        } catch { break; }
      }
      if (parts.length === 0) return baseUrl;

      const buffers = await Promise.all(parts.map(async (u) => {
        const r = await fetch(u);
        if (!r.ok) throw new Error("Failed part " + u);
        return new Uint8Array(await r.arrayBuffer());
      }));

      const total = buffers.reduce((a, b) => a + b.length, 0);
      const merged = new Uint8Array(total);
      let offset = 0;
      for (const b of buffers) { merged.set(b, offset); offset += b.length; }

      return URL.createObjectURL(new Blob([merged]));
    }

    async function preMergeAll() {
      const map = {};
      const files = Object.entries(SPLIT_MAP);
      const total = files.length;
      let done = 0;

      const loadingText = document.getElementById("loading-text");

      for (const [file, _] of files) {
        const resolved = await resolveFile("Build/" + file);
        map[file] = resolved;
        done++;
        const percent = Math.floor((done / total) * 100);
        loadingText.innerText = `LOADING... ${percent}%`;
        console.log("Resolved:", file, "→", resolved);
      }

      loadingText.style.display = "none";

      return map;
    }

    (async () => {
      const mergedMap = await preMergeAll();
      window.SPLIT_MAP = mergedMap;
      const origFetch = window.fetch;
      window.fetch = async function(resource, options) {
        if (typeof resource === "string") {
          const key = resource.split("/").pop();
          if (mergedMap[key]) {
            console.log("Redirect fetch:", key);
            return origFetch(mergedMap[key], options);
          }
          if (resource.includes("StreamingAssets")) {
            return origFetch((document.querySelector('base').href !== null ? document.querySelector('base').href+"/" : "") + "StreamingAssets/"+resource.split("/StreamingAssets/")[1])
          }
        }
        return origFetch(resource, options);
      };

      const OrigXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OrigXHR();
        const origOpen = xhr.open;
        xhr.open = function(method, url, ...rest) {
          const key = url.split("/").pop();
          if (mergedMap[key]) {
            console.log("Redirect XHR:", key);
            origOpen.call(xhr, method, mergedMap[key], ...rest);
          } else {
            origOpen.call(xhr, method, url, ...rest);
          }
        };
        return xhr;
      };

      const canvas = document.querySelector("#unity-canvas");
      const loaderUrl = "Build/Build.loader.js";
      const config = {
        dataUrl: mergedMap["29e3d3c8908bb566507cd8b1b3560e15.data"],
        frameworkUrl: mergedMap["01288fb2e5f57e194e52e16f7bed4cd4.framework.js"],
        codeUrl: mergedMap["0c2c310b28788b93284ef8d4d4fc6791.wasm"],
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Hammer 2",
        productName: "Hammer 2",
        productVersion: "1.0.0"
      };

      const script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {}).then((unityInstance) => {
          window.gameInstance = unityInstance;
        }).catch((message) => alert(message));
      };
      document.body.appendChild(script);
    })();
    </script>

    <script>
    function resizeCanvas() {
      const canvas = document.getElementById("unity-canvas");
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
    }
    window.addEventListener("load", resizeCanvas);
    window.addEventListener("resize", resizeCanvas);
    </script>
  </body>
</html>
